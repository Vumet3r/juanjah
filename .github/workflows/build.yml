name: Build Juanjah

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone JUCE 8.0.13
        run: |
          git clone --depth 1 --branch 8.0.13 https://github.com/juce-framework/JUCE.git lib/JUCE

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libwebkit2gtk-4.1-dev

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Locate VST3 (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: dir /s /b build\*.vst3

      - name: Upload VST3 (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Juanjah-Windows
          path: |
            build/Juanjah_artefacts/Release/VST3/Juanjah.vst3
            build/Juanjah_artefacts/Release/VST3/Juanjah.vst3/**

      - name: Upload VST3 (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Juanjah-macOS
          path: |
            build/Juanjah_artefacts/VST3/Juanjah.vst3
            build/Juanjah_artefacts/AU/Juanjah.component

      - name: Upload VST3 (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Juanjah-Linux
          path: |
            build/Juanjah_artefacts/VST3/Juanjah.vst3

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Juanjah_artefacts/Release/VST3/Juanjah.vst3
            build/Juanjah_artefacts/Release/VST3/Juanjah.vst3/**
          fail_on_unmatched_files: false
